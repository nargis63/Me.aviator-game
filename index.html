<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>असली कसीनो गेम प्लेटफार्म</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Roboto, sans-serif; }
        body { background: #0b0e14; color: #fff; padding: 15px; -webkit-user-select: none; }
        
        /* टॉप बार (बैलेंस और प्रोफाइल) */
        .header { display: flex; justify-content: space-between; align-items: center; background: #151a26; padding: 12px 20px; border-radius: 12px; margin-bottom: 20px; border-bottom: 3px solid #ff0055; }
        .logo { font-size: 20px; font-weight: bold; color: #ff0055; text-shadow: 0 0 10px rgba(255,0,85,0.5); }
        .balance-box { background: #22293a; padding: 8px 15px; border-radius: 20px; font-weight: bold; color: #22c55e; border: 1px solid #22c55e; }

        /* गेम ग्रिड */
        .game-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin-bottom: 20px; }
        .game-card { background: #151a26; border-radius: 15px; padding: 20px 10px; text-align: center; border: 1px solid #22293a; cursor: pointer; transition: 0.2s; position: relative; overflow: hidden; }
        .game-card:active { transform: scale(0.95); background: #1e2536; }
        .game-icon { font-size: 45px; margin-bottom: 10px; display: block; }
        .game-title { font-size: 16px; font-weight: bold; }
        .tag { position: absolute; top: 5px; right: 5px; background: #ff0055; font-size: 10px; padding: 2px 6px; border-radius: 8px; font-weight: bold; }

        /* एविएटर गेम स्क्रीन (पॉपअप मॉडल) */
        .game-screen { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #0b0e14; z-index: 100; padding: 15px; }
        .back-btn { background: #22293a; color: white; border: none; padding: 8px 15px; border-radius: 8px; margin-bottom: 15px; font-weight: bold; }
        
        #aviator-zone { background: #000; height: 220px; border-radius: 12px; position: relative; overflow: hidden; border: 1px solid #333; margin-bottom: 15px; }
        #multiplier { font-size: 40px; font-weight: bold; text-align: center; margin-top: 80px; color: #fff; }
        #plane { position: absolute; bottom: 20px; left: 20px; font-size: 30px; transition: transform 0.1s linear; }
        
        .bet-controls { background: #151a26; padding: 15px; border-radius: 12px; text-align: center; }
        .input-bet { width: 100%; padding: 12px; background: #22293a; border: 1px solid #333; color: white; border-radius: 8px; text-align: center; font-size: 18px; margin-bottom: 12px; }
        .btn-main { width: 100%; padding: 15px; font-size: 18px; font-weight: bold; color: white; border: none; border-radius: 8px; cursor: pointer; }
        .btn-bet { background: #22c55e; }
        .btn-cashout { background: #e11d48; display: none; }
    </style>
</head>
<body>

    <!-- मुख्य कसीनो लॉबी -->
    <div id="lobby">
        <div class="header">
            <div class="logo">👑 REAL CASINO</div>
            <div class="balance-box">₹<span id="user-balance">5000</span></div>
        </div>

        <div class="game-grid">
            <div class="game-card" onclick="openGame('aviator')">
                <span class="tag">POPULAR</span>
                <span class="game-icon">🚀</span>
                <span class="game-title">Aviator</span>
            </div>
            <div class="game-card" onclick="alert('Slots गेम जल्द आ रहा है!')">
                <span class="game-icon">🎰</span>
                <span class="game-title">Slots</span>
            </div>
            <div class="game-card" onclick="alert('Poker गेम जल्द आ रहा है!')">
                <span class="game-icon">🃏</span>
                <span class="game-title">Poker</span>
            </div>
            <div class="game-card" onclick="alert('Fishing गेम जल्द आ रहा है!')">
                <span class="game-icon">🦈</span>
                <span class="game-title">Fishing</span>
            </div>
        </div>
    </div>

    <!-- एविएटर गेम स्क्रीन -->
    <div id="aviator-screen" class="game-screen">
        <button class="back-btn" onclick="closeGame()">⬅ लॉबी में जाएं</button>
        <div id="aviator-zone">
            <div id="multiplier">1.00x</div>
            <div id="plane">✈️</div>
        </div>
        <div class="bet-controls">
            <input type="number" id="bet-val" class="input-bet" value="100">
            <button id="action-btn" class="btn-main btn-bet" onclick="startAviatorRound()">बेट लगाएं (Bet)</button>
        </div>
    </div>

    <script>
        let balance = 5000;
        let running = false;
        let currentMultiplier = 1.00;
        let loop;
        let crashAt;

        function updateBalanceUI() {
            document.getElementById('user-balance').innerText = balance.toFixed(2);
        }

        function openGame(game) {
            if(game === 'aviator') {
                document.getElementById('aviator-screen').style.display = 'block';
            }
        }

        function closeGame() {
            document.getElementById('aviator-screen').style.display = 'none';
            resetRound();
        }

        function startAviatorRound() {
            let betAmt = parseFloat(document.getElementById('bet-val').value);
            if (betAmt > balance || betAmt <= 0) return alert("सही अमाउंट डालें!");

            balance -= betAmt;
            updateBalanceUI();

            running = true;
            currentMultiplier = 1.00;
            crashAt = (Math.random() * 5 + 1).toFixed(2); // रैंडम क्रैश

            let btn = document.getElementById('action-btn');
            btn.className = "btn-main btn-cashout";
            btn.style.display = "block";
            btn.innerText = "कैश आउट (Take Win)";
            btn.onclick = cashOutRound;

            let plane = document.getElementById('plane');
            plane.style.transform = "translate(0px, 0px)";

            loop = setInterval(() => {
                currentMultiplier += 0.03;
                document.getElementById('multiplier').innerText = currentMultiplier.toFixed(2) + "x";
                document.getElementById('multiplier').style.color = "#22c55e";
                
                // हवाई जहाज का हिलना
                let progress = (currentMultiplier - 1) * 30;
                plane.style.transform = `translate(${progress * 1.5}px, -${progress}px)`;

                if (currentMultiplier >= crashAt) {
                    clearInterval(loop);
                    document.getElementById('multiplier').innerText = "💥 CRASHED @ " + crashAt + "x";
                    document.getElementById('multiplier').style.color = "#ef4444";
                    resetRound();
                }
            }, 100);
        }

        function cashOutRound() {
            if (!running) return;
            clearInterval(loop);
            let betAmt = parseFloat(document.getElementById('bet-val').value);
            let win = betAmt * currentMultiplier;
            balance += win;
            updateBalanceUI();
            alert("जीत गए! आपको मिले: ₹" + win.toFixed(2));
            resetRound();
        }

        function resetRound() {
            running = false;
            clearInterval(loop);
            let btn = document.getElementById('action-btn');
            btn.className = "btn-main btn-bet";
            btn.innerText = "बेट लगाएं (Bet)";
            btn.onclick = startAviatorRound;
        }
    </script>
</body>
</html>
