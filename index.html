<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aviator Live Official</title>
    <script src="https://socket.io"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; user-select: none; }
        body { background: #101112; color: #fff; padding: 8px; }
        
        /* हेडर */
        .casino-header { display: flex; justify-content: space-between; align-items: center; background: #1b1c1d; padding: 8px 12px; border-radius: 8px; margin-bottom: 5px; border-bottom: 2px solid #cb011a; }
        .brand { color: #cb011a; font-weight: 900; font-size: 20px; font-style: italic; }
        .wallet-box { background: #2c2d30; color: #2de35d; font-weight: bold; padding: 6px 14px; border-radius: 20px; font-size: 14px; }

        /* पुराना इतिहास बार (Top History Pearls) */
        .history-bar { display: flex; gap: 6px; overflow-x: auto; padding: 6px; background: #141516; border-radius: 6px; margin-bottom: 8px; min-height: 35px; align-items: center; }
        .history-pearl { background: #2c2d30; color: #9ca3af; font-size: 11px; padding: 3px 8px; border-radius: 10px; font-weight: bold; min-width: 45px; text-align: center; border: 1px solid #3d3e42; }
        .pearl-high { color: #c084fc; border-color: #a855f7; }

        /* मुख्य लाइव एविएटर स्क्रीन (कसीनो रे एनीमेशन के साथ) */
        .main-board { background: #000; height: 240px; border-radius: 12px; border: 1px solid #2c2d30; position: relative; overflow: hidden; margin-bottom: 10px; display: flex; align-items: center; justify-content: center; }
        
        /* घूमती हुई लाइट का बैकग्राउंड */
        .bg-rays { position: absolute; width: 200%; height: 200%; background: repeating-conic-gradient(from 0deg, #18191a 0deg 15deg, #111213 15deg 30deg); top: -50%; left: -50%; display: none; z-index: 1; }
        @keyframes rotateRays { 100% { transform: rotate(360deg); } }

        /* कैनवास (लाल कर्व लाइन के लिए) */
        #graphCanvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 2; pointer-events: none; }

        .multiplier-text { font-size: 55px; font-weight: 900; color: #fff; z-index: 5; text-shadow: 0 0 15px rgba(0,0,0,0.8); }
        .plane-animator { position: absolute; bottom: 20px; left: 20px; font-size: 40px; display: none; z-index: 4; transform: scaleX(-1); filter: drop-shadow(0 0 8px #cb011a); }

        /* बेटिंग बॉक्स - डबल पैनल */
        .betting-container { display: grid; grid-template-columns: 1fr; gap: 8px; }
        @media(min-width: 600px) { .betting-container { grid-template-columns: 1fr 1fr; } }
        
        .bet-card { background: #1b1c1d; border: 1px solid #2c2d30; border-radius: 12px; padding: 10px; width: 100%; }
        .input-row { display: flex; width: 100%; gap: 6px; margin-bottom: 8px; }
        .number-selector { flex: 1; display: flex; background: #101112; border: 1px solid #3d3e42; border-radius: 6px; overflow: hidden; }
        .num-btn { background: none; border: none; color: #8a8b8c; width: 35px; font-size: 20px; cursor: pointer; }
        .main-input { flex: 1; background: none; border: none; color: #fff; text-align: center; font-size: 18px; font-weight: bold; width: 50px; }
        
        .action-green-btn { width: 100%; padding: 14px; font-size: 18px; font-weight: 900; color: #fff; border: none; border-radius: 8px; cursor: pointer; text-transform: uppercase; background: #2de35d; box-shadow: 0 4px 15px rgba(45,227,93,0.3); }
        .state-cashout-orange { background: #d97706; box-shadow: 0 4px 15px rgba(217,119,6,0.4); }
        .state-wait { background: #4b5563; color: #9ca3af; cursor: not-allowed; box-shadow: none; }
    </style>
</head>
<body>

    <div class="casino-header">
        <span class="brand">Aviator</span>
        <div class="wallet-box">₹<span id="total-wallet">5000.00</span></div>
    </div>

    <!-- पुराना इतिहास बार (Top Pearls) -->
    <div class="history-bar" id="history-section">
        <span class="history-pearl pearl-high">12.45x</span>
        <span class="history-pearl">2.13x</span>
        <span class="history-pearl">1.05x</span>
        <span class="history-pearl">4.50x</span>
    </div>

    <!-- लाइव बोर्ड -->
    <div class="main-board">
        <div class="bg-rays" id="rays"></div>
        <canvas id="graphCanvas"></canvas>
        <div class="multiplier-text" id="mult-screen">WAITING...</div>
        <div class="plane-animator" id="red-plane-wrapper">🚀</div>
    </div>

    <!-- डबल बेटिंग बोर्ड -->
    <div class="betting-container">
        <!-- पहला बेट पैनल -->
        <div class="bet-card">
            <div class="input-row">
                <div class="number-selector">
                    <button class="num-btn" onclick="adjustValue('amt-1', -10)">-</button>
                    <input type="number" id="amt-1" class="main-input" value="100">
                    <button class="num-btn" onclick="adjustValue('amt-1', 10)">+</button>
                </div>
            </div>
            <button id="btn-p1" class="action-green-btn" onclick="triggerBet(1)">BET<br><span style="font-size:11px;font-weight:normal;">100.00 INR</span></button>
        </div>
        <!-- दूसरा बेट पैनल -->
        <div class="bet-card">
            <div class="input-row">
                <div class="number-selector">
                    <button class="num-btn" onclick="adjustValue('amt-2', -10)">-</button>
                    <input type="number" id="amt-2" class="main-input" value="200">
                    <button class="num-btn" onclick="adjustValue('amt-2', 10)">+</button>
                </div>
            </div>
            <button id="btn-p2" class="action-green-btn" onclick="triggerBet(2)">BET<br><span style="font-size:11px;font-weight:normal;">200.00 INR</span></button>
        </div>
    </div>

    <script>
        const SERVER_URL = "https://onrender.com"; 
        const socket = io(SERVER_URL);

        let userBalance = 5000.00;
        let activeBets = { 1: { amt: 0, status: 'none' }, 2: { amt: 0, status: 'none' } };
        let isRoundLive = false;
        let lastKnownMult = 1.00;

        const canvas = document.getElementById('graphCanvas');
        const ctx = canvas.getContext('2d');

        function resizeCanvas() {
            canvas.width = canvas.parentElement.clientWidth;
            canvas.height = canvas.parentElement.clientHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        function adjustValue(id, val) {
            let input = document.getElementById(id);
            let current = parseFloat(input.value) || 0;
            if (current + val >= 10) {
                input.value = current + val;
                updateButtonText(id.split('-')[1]);
            }
        }

        function updateButtonText(num) {
            let btn = document.getElementById('btn-p' + num);
            let amt = document.getElementById('amt-' + num).value;
            if (activeBets[num].status === 'none') {
                btn.innerHTML = `BET<br><span style="font-size:11px;font-weight:normal;">${parseFloat(amt).toFixed(2)} INR</span>`;
            }
        }

        // लाइव उड़ान और लाइन एनीमेशन
        socket.on('live_multiplier', (data) => {
            isRoundLive = true;
            lastKnownMult = parseFloat(data.multiplier);
            
            let screen = document.getElementById('mult-screen');
            screen.innerText = data.multiplier + "x";
            screen.style.color = "#fff"; 

            // लाइट्स चालू करें
            let rays = document.getElementById('rays');
            rays.style.display = "block";
            rays.style.animation = "rotateRays 20s linear infinite";

            let plane = document.getElementById('red-plane-wrapper');
            plane.style.display = "block";
            
            // उड़ान की स्थिति की गणना
            let progress = Math.min((lastKnownMult - 1) / 4, 1); 
            let startX = 30;
            let startY = canvas.height - 30;
            let endX = startX + (canvas.width - 100) * progress;
            let endY = startY - (canvas.height - 100) * progress;

            plane.style.left = (endX - 20) + "px";
            plane.style.bottom = (canvas.height - endY - 20) + "px";

            // लाल लाइन और नीचे का शैडो खींचना
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // शैडो एरिया
            ctx.beginPath();
            ctx.moveTo(startX, startY);
            ctx.quadraticCurveTo(startX + (endX - startX) * 0.5, startY, endX, endY);
            ctx.lineTo(endX, startY);
            ctx.closePath();
            ctx.fillStyle = 'rgba(203, 1, 26, 0.2)';
            ctx.fill();

            // मुख्य लाल लाइन
            ctx.beginPath();
            ctx.moveTo(startX, startY);
            ctx.quadraticCurveTo(startX + (endX - startX) * 0.5, startY, endX, endY);
            ctx.strokeStyle = '#cb011a';
            ctx.lineWidth = 4;
            ctx.shadowBlur = 10;
            ctx.shadowColor = '#cb011a';
            ctx.stroke();
            ctx.shadowBlur = 0; // रीसेट

            // बटन अपडेट
            for (let num of) {
                if (activeBets[num].status === 'placed') {
                    let btn = document.getElementById('btn-p' + num);
                    let currentWin = activeBets[num].amt * lastKnownMult;
                    btn.className = "action-green-btn state-cashout-orange";
                    btn.innerHTML = `CASH OUT<br><span style="font-size:12px;">₹${currentWin.toFixed(2)}</span>`;
                }
            }
        });

        // क्रैश होने पर
        socket.on('round_crashed', (data) => {
            isRoundLive = false;
            let screen = document.getElementById('mult-screen');
