<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>असली लाइव एविएटर गेम</title>
    <!-- Socket.io क्लाइंट लाइब्रेरी -->
    <script src="https://socket.io"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        body { background: #000; color: #fff; padding: 10px; }
        
        /* टॉप बार और पुराना इतिहास */
        .top-nav { display: flex; justify-content: space-between; align-items: center; padding: 8px; background: #1b1c21; border-radius: 8px; margin-bottom: 10px; }
        .logo-red { color: #e50914; font-weight: bold; font-size: 18px; }
        .bal { color: #22c55e; font-weight: bold; background: #262930; padding: 5px 12px; border-radius: 15px; }
        
        .history-bar { display: flex; gap: 6px; overflow-x: auto; padding: 5px 0; margin-bottom: 10px; }
        .history-pearl { background: #262930; color: #9ca3af; font-size: 11px; padding: 3px 8px; border-radius: 10px; border: 1px solid #374151; font-weight: bold; min-width: 45px; text-align: center; }
        .pearl-high { color: #c084fc; border-color: #a855f7; }

        /* मुख्य लाइव एविएटर बोर्ड */
        .aviator-board { background: radial-gradient(circle, #1c1d24 0%, #0c0d12 100%); height: 260px; border-radius: 12px; border: 1px solid #1f2937; position: relative; overflow: hidden; margin-bottom: 15px; }
        .main-multiplier { position: absolute; width: 100%; text-align: center; top: 80px; font-size: 55px; font-weight: bold; color: #fff; text-shadow: 0 0 15px rgba(255,255,255,0.2); z-index: 5; }
        
        /* ग्राफिक्स और हवाई जहाज एनीमेशन */
        .plane-box { position: absolute; bottom: 30px; left: 30px; width: 50px; height: 40px; display: none; transition: transform 0.1s linear; z-index: 4; }
        .red-plane { width: 100%; filter: drop-shadow(0 0 8px #e50914); }
        .graph-line { position: absolute; bottom: 0; left: 0; width: 100%; height: 100%; stroke: #e50914; stroke-width: 3; fill: none; display: none; }
        
        /* बेटिंग बॉक्स (कसीनो डिजाइन) */
        .bet-box { background: #131418; border: 1px solid #1f2937; padding: 15px; border-radius: 12px; display: flex; gap: 10px; flex-direction: column; align-items: center; }
        .bet-input-section { display: flex; width: 100%; gap: 10px; align-items: center; }
        .bet-input-section input { flex: 1; padding: 12px; font-size: 20px; text-align: center; background: #000; border: 1px solid #374151; color: #fff; border-radius: 8px; font-weight: bold; }
        .bet-button { width: 100%; padding: 15px; font-size: 20px; font-weight: bold; color: #fff; border: none; border-radius: 8px; cursor: pointer; text-shadow: 1px 1px 2px rgba(0,0,0,0.5); }
        .state-bet { background: #22c55e; box-shadow: 0 4px 15px rgba(34,197,94,0.4); }
        .state-cashout { background: #d97706; box-shadow: 0 4px 15px rgba(217,119,6,0.4); }
        .state-waiting { background: #4b5563; cursor: not-allowed; }
    </style>
</head>
<body>

    <div class="top-nav">
        <span class="logo-red">✈ Aviator</span>
        <div class="bal">₹<span id="wallet">5000.00</span></div>
    </div>

    <!-- पुराना इतिहास -->
    <div class="history-bar" id="history">
        <span class="history-pearl">1.34x</span>
        <span class="history-pearl pearl-high">12.5x</span>
        <span class="history-pearl">2.10x</span>
        <span class="history-pearl">1.05x</span>
    </div>

    <!-- लाइव मुख्य बोर्ड -->
    <div class="aviator-board">
        <div class="main-multiplier" id="display-mult">वेटिंग...</div>
        <div class="plane-box" id="plane-wrapper">
            <!-- सुंदर लाल हवाई जहाज इमोटिकॉन -->
            <span style="font-size: 40px; display: block; transform: scaleX(-1);">✈️</span>
        </div>
    </div>

    <!-- बेटिंग टूल्स -->
    <div class="bet-box">
        <div class="bet-input-section">
            <input type="number" id="bet-amt" value="10" min="10">
        </div>
        <button id="action-btn" class="bet-button state-bet" onclick="placeBet()">BET</button>
    </div>

    <script>
        // ⚠️ यहाँ अपने Render लाइव सर्वर का लिंक डाला है
    
        const SERVER_URL = "https://onrender.com";

        const socket = io(SERVER_URL);

        let myBalance = 5000.00;
        let myCurrentBet = 0;
        let hasBetThisRound = false;
        let isLiveRunning = false;
        let lastMult = 1.00;

        // सर्वर से लाइव डेटा प्राप्त करना
        socket.on('live_multiplier', (data) => {
            isLiveRunning = true;
            lastMult = parseFloat(data.multiplier);
            
            let displayElement = document.getElementById('display-mult');
            displayElement.innerText = data.multiplier + "x";
            displayElement.style.color = "#22c55e"; // लाइव काउंटिंग हरा दिखेगा

            let plane = document.getElementById('plane-wrapper');
            plane.style.display = "block";
            
            // लाइव हवाई जहाज का ऊपर की तरफ उड़ना
            let progress = (lastMult - 1) * 35;
            plane.style.transform = `translate(${progress * 1.3}px, -${progress}px)`;

            // बटन स्टेट अपडेट करना
            let btn = document.getElementById('action-btn');
            if (hasBetThisRound) {
                btn.className = "bet-button state-cashout";
                btn.innerText = `CASH OUT\n₹${(myCurrentBet * lastMult).toFixed(2)}`;
                btn.onclick = cashOutRound;
            }
        });

        // प्लेन क्रैश होने पर
        socket.on('round_crashed', (data) => {
            isLiveRunning = false;
            let displayElement = document.getElementById('display-mult');
            displayElement.innerText = "FLEW AWAY \n" + data.crashPoint + "x";
            displayElement.style.color = "#ef4444"; // क्रैश होने पर लाल रंग

            document.getElementById('plane-wrapper').style.display = "none";
            
            // इतिहास बार में जोड़ना
            addHistoryPearl(data.crashPoint);

            // राउंड रीसेट करना
            hasBetThisRound = false;
            myCurrentBet = 0;
            
            let btn = document.getElementById('action-btn');
            btn.className = "bet-button state-bet";
            btn.innerText = "BET";
            btn.disabled = false;
            btn.onclick = placeBet;
        });

        function placeBet() {
            if (isLiveRunning) return alert("अगले राउंड का इंतजार करें!");
            let amt = parseFloat(document.getElementById('bet-amt').value);
            if (amt > myBalance || amt <= 0) return alert("सही अमाउंट डालें!");

            myBalance -= amt;
            myCurrentBet = amt;
            hasBetThisRound = true;
            document.getElementById('wallet').innerText = myBalance.toFixed(2);

            let btn = document.getElementById('action-btn');
            btn.className = "bet-button state-waiting";
            btn.innerText = "WAITING FOR ROUND...";
            btn.disabled = true;
        }

        function cashOutRound() {
            if (!hasBetThisRound || !isLiveRunning) return;
            
            let win = myCurrentBet * lastMult;
            myBalance += win;
            document.getElementById('wallet').innerText = myBalance.toFixed(2);
            alert("जीत गए! आपको मिले: ₹" + win.toFixed(2));
            
            hasBetThisRound = false;
            myCurrentBet = 0;
            
            let btn = document.getElementById('action-btn');
            btn.className = "bet-button state-waiting";
            btn.innerText = "NEXT ROUND WAITING...";
            btn.disabled = true;
        }

        function addHistoryPearl(val) {
            let hist = document.getElementById('history');
            let pearl = document.createElement('span');
            pearl.className = "history-pearl " + (val >= 10 ? "pearl-high" : "");
            pearl.innerText = val + "x";
            hist.insertBefore(pearl, hist.firstChild);
        }
    </script>
</body>
</html>
